<h2 style="marginTop: 30px; marginLeft: 30px; font-family: Helvetica; font-weight: bold;" > <i class="bi bi-pencil"></i> Editer le Film</h2>

<div style="marginTop: 30px; marginLeft: 30px;" class="container">
  <div class="d-flex flex-column ">
    <label for="title"><i class="bi bi-film"></i> Titre</label>
    <input type="text" id="title" name="title" [(ngModel)]="movie.title"/>
  </div>

  <div class="d-flex flex-column " style="margin-top: 20px;">
    <label for="director"><i class="bi bi-person"></i> Realisateur</label>
    <input type="text" id="director" name="director" [(ngModel)]="movie.director"/>
  </div>

  <div class="d-flex flex-column " style="margin-top: 20px;">
    <label for="releaseDate"><i class="bi bi-calendar-date"></i> Date de parution</label>
    <input type="date" id="releaseDate" name="releaseDate" (ngModel)="movie.releaseDate" [ngModel]="movie.releaseDate | date:'yyyy-MM-dd'"/>
  </div>

  <div class="d-flex flex-column " style="margin-top: 20px;">
    <label for="synopsis"><i class="bi bi-card-text"></i> Synopsis</label>
    <textarea id="synopsis" name="synopsis" [(ngModel)]="movie.synopsis" rows="3"></textarea>
  </div>

  <button class="btn btn-warning" style="marginTop: 30px;" (click)=updateMovie()>
  <i class="bi bi-check-circle me-2"></i>  Enregistrer</button>

</div>

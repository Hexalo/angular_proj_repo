<button class="btn btn-outline-warning w-100" (click)="open()">
    <i class="bi bi-star-half"></i> Noter le film
</button>

@if (isModalOpen) {
<div class="modal fade show d-block" style="background: rgba(0,0,0,0.5)">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Noter : {{ movie.title }}</h5>
                <button type="button" class="btn-close" (click)="close()"></button>
            </div>
            <div class="modal-body text-center">
                <p class="text-muted mb-4">Moyenne actuelle : <strong>{{ movie.rate ?? 'N/A' }}</strong> / 5</p>

                <div class="d-flex justify-content-center gap-2 mb-4">
                    @for (star of [1,2,3,4,5]; track star) {
                    <i class="bi h2" [class.bi-star-fill]="selectedNote >= star" [class.bi-star]="selectedNote < star"
                        (click)="selectedNote = star" style="color: #ffc107; cursor: pointer;"></i>
                    }
                </div>

                <div class="mt-3 text-start">
                    <label class="form-label small fw-bold">Votre commentaire :</label>
                    <textarea class="form-control" [(ngModel)]="reviewText" rows="3" 
                        placeholder="Qu'avez-vous pensé du film ?"></textarea>
                </div>

                @if (selectedNote > 0) {
                <p class="text-warning fw-bold">Votre sélection : {{ selectedNote }} / 5</p>
                }
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" (click)="close()">Annuler</button>
                <button class="btn btn-warning" (click)="confirm()">Valider la note</button>
            </div>
        </div>
    </div>
</div>
}

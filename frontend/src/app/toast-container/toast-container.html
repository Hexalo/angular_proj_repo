<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1200">
  <div *ngFor="let toast of toastService.toasts()"
       class="toast show align-items-center border-0"
       [ngClass]="'text-bg-' + toast.type"
       role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        {{ toast.message }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastService.remove()" aria-label="Close"></button>
    </div>
  </div>
</div>

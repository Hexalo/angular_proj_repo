<div class="card shadow m-4" style="width: 18rem; min-height: 55rem">
  @if(movie.image) {
  <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'" class="card-img-top" alt="">
  }
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{movie.title}}</h5>
    <p class="card-text flex-grow-1">{{movie.synopsis}}</p>

    <div class="mt-auto pt-2 border-top">
      <app-note-movie [movie]="movie" (rated)="handleRate($event)"></app-note-movie>
    </div>
  </div>
</div>

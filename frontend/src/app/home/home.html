<h1 style="margin-left: 10%; margin-right: 10%; margin-top: 2%; margin-bottom: 2%">Tendances</h1>
<div class="carousel">
  <button class="nav-btn" (click)="previous()">‹</button>
  <div class="list-movies">
    @for (movie of getVisibleMovies((movies$ | async) ?? []); track movie.id) {
      <app-movie-card [movie]="movie"></app-movie-card>
    }
  </div>
  <button class="nav-btn" (click)="next()">›</button>
</div>

<h1 style="margin-left: 10%; margin-right: 10%; margin-top: 2%; margin-bottom: 2%">Notre Catalogue</h1>
<div class="movies">
@for (movie of movies$ | async; track movie.id) {
    <app-movie-card [movie]=movie></app-movie-card>
}
</div>

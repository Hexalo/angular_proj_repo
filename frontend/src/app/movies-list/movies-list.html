<div class="table-container">
  <h2 style="marginTop: 30px; marginLeft: 30px; font-family: Helvetica; font-weight: bold;">
  <i class="bi bi-film"></i> Gestion de films
  </h2>

  <table border="1" cellpadding="5" cellspacing="0" width="100%" class="table table-striped" style="margin: 30px">

    <thead>
      <tr>
        <th><i class="bi bi-hash"></i> id</th>
        <th><i class="bi bi-film"></i> titre</th>
        <th><i class="bi bi-calendar-date"></i> date</th>
        <th><i class="bi bi-person"></i> realisateur</th>
        <th><i class="bi bi-star"></i> note</th>
        <th><i class="bi bi-card-text"></i> synopsis</th>
        <th><i class="bi bi-gear"></i> actions</th>
      </tr>
    </thead>

    <tbody>
      @for (movie of movies; track movie.id) {
      <tr >

        <td>{{ movie.id }}</td>

        <td>{{ movie.title }}</td>

        <td>{{ movie.releaseDate | date:'dd/MM/yyyy'  }}</td>

        <td>{{ movie.director }}</td>

        <td>{{ movie.rate }}</td>

        <td>{{ movie.synopsis }}</td>

        <td>
          <button type="button" class="btn btn-danger deleteButton" (click)="deleteMovie(movie.id)"><i class="bi bi-trash"></i></button>
          <button [routerLink]="['/update-movie', movie.id]" type="button" class="btn btn-primary editButton">
            <i class="bi bi-pencil"></i>
          </button>
      </tr>
    }
    </tbody>
  </table>
  <button type="button" style="marginLeft: 30px; margin-bottom: 30px;" class="btn btn-primary " routerLink="/add-movie">
    <i class="bi bi-plus-circle"></i> Nouveau Film
  </button>
</div>
